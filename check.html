<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบรายชื่อ - CRA Think Share 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>

  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
    
    .search-input {
      width: 100%; padding: 1.2rem 1.5rem 1.2rem 3.5rem; border-radius: 1rem;
      border: 2px solid transparent; background: #ffffff;
      outline: none; transition: all 0.25s ease;
      font-weight: 600; color: #0f172a; font-size: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }
    .search-input:focus { border-color: #0ea5e9; box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.15); }
    
    .list-card {
      background: #ffffff; border-radius: 1rem; padding: 1.25rem;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9; transition: transform 0.2s;
    }
    .list-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-color: #e2e8f0; }

    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* =========================================
       สไตล์ Tabs จาก Uiverse (แสดงเฉพาะ Desktop)
       ========================================= */
    .tabs {
      display: flex; gap: 12px; overflow-x: auto;
      padding: 1.5rem 0.5rem 2.5rem 0.5rem; width: 100%;
      justify-content: center;
    }

    .tab-group input { display: none; }

    .tab-group label {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; flex-shrink: 0; line-height: 1.6;
      border: 2px solid #e2e8f0; border-radius: 14px;
      cursor: pointer; font-weight: 700; font-size: 1.1rem;
      position: relative; background-color: #ffffff; color: #64748b;
      transition: all 0.48s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .tab-group label::after {
      content: ""; position: absolute; bottom: -32px; left: 50%;
      width: 8px; height: 8px; border-radius: 50%;
      background-color: #0f172a; transform: translateX(-50%);
      transform-origin: 0 0; scale: 0; opacity: 0; z-index: 10;
      transition: all 0.48s 0.2s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .tab-group label::before {
      content: ""; position: absolute; top: -24px; left: 50%;
      width: 48px; height: 48px; border-radius: 14px;
      background-color: #0f172a; transform: translate(-50%, -50%);
      z-index: -1; opacity: 0; scale: 0; transform-origin: 0 0;
      transition: all 0.48s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .tab-group label:hover { border-color: #0f172a; color: #0f172a; }
    .tab-group input:checked + label { border-color: transparent; color: #ffffff; scale: 1.1; }
    .tab-group input:checked + label::after { bottom: -16px; opacity: 1; scale: 1; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.3); }
    .tab-group input:checked + label::before { opacity: 1; scale: 1; top: 50%; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.4); }
  </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col items-center p-5 md:p-10">

  <div class="fixed top-0 left-0 w-full h-2 bg-gradient-to-r from-[#0a2240] via-[#0ea5e9] to-[#ff6b00] z-50"></div>

  <div class="w-full max-w-3xl flex flex-col mt-4">
    
    <div class="flex justify-between items-center mb-8">
       <a href="index.html" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-[#0f172a] font-bold transition-colors no-underline bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
         <i class="fi fi-sr-arrow-small-left mt-0.5 text-lg"></i> กลับหน้าหลัก
       </a>
       <img src="https://s.imgz.io/2026/04/08/image-119644b2a1df1904f.png" alt="CRA Logo" class="h-8 sm:h-10 opacity-90">
    </div>

    <div class="text-center mb-8">
       <h1 class="text-3xl md:text-4xl font-black text-[#0f172a] tracking-tight mb-2">ตรวจสอบรายชื่อ</h1>
       <p class="text-slate-500 font-medium">ค้นหาจากชื่อ-นามสกุล ของท่านเพื่อดูรหัสประจำตัว</p>
    </div>

    <div class="relative mb-2 max-w-xl mx-auto w-full">
      <i class="fi fi-sr-search absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="พิมพ์ชื่อ หรือ นามสกุล เพื่อค้นหา..." autocomplete="off">
    </div>

    <div id="paginationWrapper" class="w-full max-w-xl mx-auto hidden">
      
      <div id="mobilePagination" class="flex md:hidden items-center justify-between mt-4 mb-6 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm">
        <button id="btnPrev" onclick="prevPage()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-200 active:bg-slate-300 disabled:opacity-30 disabled:pointer-events-none transition-all">
          <i class="fi fi-sr-angle-left mt-1"></i>
        </button>
        <div id="pageIndicator" class="font-bold text-slate-700 text-sm tracking-wide">หน้า 1 / 10</div>
        <button id="btnNext" onclick="nextPage()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-200 active:bg-slate-300 disabled:opacity-30 disabled:pointer-events-none transition-all">
          <i class="fi fi-sr-angle-right mt-1"></i>
        </button>
      </div>

      <div id="desktopPagination" class="hidden md:flex tabs hide-scroll">
        </div>

    </div>

    <div id="loadingState" class="text-center py-10">
      <i class="fi fi-sr-spinner animate-spin text-4xl text-[#0ea5e9]"></i>
      <p class="text-slate-500 font-bold mt-4">กำลังดึงข้อมูลรายชื่อ...</p>
    </div>

    <div id="resultCount" class="text-sm font-bold text-slate-500 mb-3 hidden pl-2"></div>

    <div id="resultsContainer" class="space-y-3 pb-10 hidden">
      </div>

  </div>

  <script>
    // ⚠️ นำลิงก์ Web App URL จาก Apps Script มาวางที่นี่
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxb95U9rbflq0JreqtjUyYSYtYcpOtc3F4y7IGJI0ek0X4XcUEl4nicEPtTyRyPanpJcg/exec";
    
    let allParticipants = []; 
    const itemsPerPage = 20;
    let currentPage = 1;

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');
    const loadingState = document.getElementById('loadingState');
    const resultCount = document.getElementById('resultCount');
    const paginationWrapper = document.getElementById('paginationWrapper');
    const desktopPagination = document.getElementById('desktopPagination');

    window.onload = () => {
      fetch(SCRIPT_URL + "?action=getRegisteredList")
        .then(response => response.json())
        .then(data => {
          allParticipants = data;
          loadingState.classList.add('hidden');
          resultsContainer.classList.remove('hidden');
          resultCount.classList.remove('hidden');
          
          allParticipants.sort((a, b) => a.id.localeCompare(b.id));
          
          if(allParticipants.length > 0) {
             renderPagination();
             goToPage(1);
          } else {
             renderList([]); 
          }
        })
        .catch(error => {
          loadingState.innerHTML = `<i class="fi fi-sr-exclamation text-4xl text-red-500"></i><p class="text-slate-500 font-bold mt-4">ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่</p>`;
        });

      searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        
        if(searchTerm.length > 0) {
           paginationWrapper.classList.add('hidden'); // ซ่อนปุ่มเปลี่ยนหน้าตอนค้นหา
           const filteredData = allParticipants.filter(person => 
             person.name.toLowerCase().includes(searchTerm)
           );
           renderList(filteredData, true);
        } else {
           renderPagination(); // นำปุ่มเปลี่ยนหน้ากลับมา
           goToPage(currentPage);
        }
      });
    };

    function renderPagination() {
      if(allParticipants.length === 0) return;
      paginationWrapper.classList.remove('hidden');
      
      const totalPages = Math.ceil(allParticipants.length / itemsPerPage);
      
      // อัปเดต Desktop (แท็กตัวเลข)
      let html = '';
      for(let i = 1; i <= totalPages; i++) {
         const isChecked = (i === currentPage) ? 'checked' : '';
         html += `
           <div class="tab-group">
             <input id="tab${i}" name="tab" value="${i}" type="radio" onchange="goToPage(${i})" ${isChecked} />
             <label for="tab${i}">
               <span>${i}</span>
             </label>
           </div>
         `;
      }
      desktopPagination.innerHTML = html;

      // อัปเดต Mobile (ปุ่มลูกศร)
      document.getElementById('pageIndicator').innerText = `หน้า ${currentPage} / ${totalPages}`;
      document.getElementById('btnPrev').disabled = (currentPage === 1);
      document.getElementById('btnNext').disabled = (currentPage === totalPages);
    }

    function prevPage() {
      if(currentPage > 1) goToPage(currentPage - 1);
    }

    function nextPage() {
      const totalPages = Math.ceil(allParticipants.length / itemsPerPage);
      if(currentPage < totalPages) goToPage(currentPage + 1);
    }

    function goToPage(page) {
      currentPage = page;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageData = allParticipants.slice(start, end);
      
      renderList(pageData, false);
      renderPagination(); // รีเฟรชปุ่มให้ Active ถูกต้อง
    }

    function renderList(dataArray, isSearching = false) {
      if(isSearching) {
         resultCount.innerHTML = `<i class="fi fi-sr-search text-orange-500 mr-1"></i> ผลการค้นหา: พบ <b>${dataArray.length}</b> รายการ`;
      } else {
         const startNum = ((currentPage - 1) * itemsPerPage) + 1;
         const endNum = startNum + dataArray.length - 1;
         resultCount.innerText = `แสดงลำดับที่ ${startNum} - ${endNum} (จากทั้งหมด ${allParticipants.length})`;
      }
      
      if (dataArray.length === 0) {
        resultsContainer.innerHTML = `
          <div class="text-center py-10 bg-white rounded-2xl border border-slate-100 shadow-sm">
            <i class="fi fi-sr-document-signed text-4xl text-slate-300 mb-3 block"></i>
            <p class="text-slate-500 font-bold">ไม่พบรายชื่อที่ต้องการ</p>
          </div>`;
        return;
      }

      // ปรับขนาดฟอนต์ให้เล็กในมือถือ (text-[13.5px]) และตัดคำ (truncate) หากชื่อยาวเกินไป
      const htmlString = dataArray.map(person => `
        <div class="list-card gap-2">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 shrink-0">
              <i class="fi fi-sr-user mt-1"></i>
            </div>
            <div class="font-bold text-[#0f172a] text-[13.5px] sm:text-[15px] md:text-[16px] truncate" title="${person.name}">
              ${person.name}
            </div>
          </div>
          <div class="bg-gradient-to-r from-[#ff6b00] to-[#ea580c] px-3 md:px-4 py-1.5 rounded-lg text-white font-black tracking-widest text-xs md:text-sm shadow-md shrink-0">
            ${person.id}
          </div>
        </div>
      `).join('');

      resultsContainer.innerHTML = htmlString;
    }
  </script>
</body>
</html>
