<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>แบบสอบถามรับคูปอง - Dek's-D TCAS Fair 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; overflow-x: hidden; background-color: #8bc34a; -webkit-tap-highlight-color: transparent;}
    .main-container { background: #ffffff; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid rgba(255,255,255,0.5); }
    
    /* Standard Input Glass */
    .input-glass { background-color: #f8fafc; border: 2px solid #e2e8f0; transition: all 0.2s; width: 100%; padding: 0.875rem 1.25rem; border-radius: 1rem; outline: none; font-weight: 500; color: #1e293b;}
    .input-glass:focus { border-color: #f57c00; box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.1); background-color: #fff; }
    select.input-glass { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.2em; padding-right: 3rem; cursor: pointer;}
    
    .btn-orange { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); color: white; transition: all 0.3s; border-radius: 9999px; }
    .btn-orange:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(245, 124, 0, 0.4); }
    .btn-orange:disabled { opacity: 0.7; cursor: not-allowed; }
    
    .step-section { display: none; animation: fadeIn 0.4s ease-out; }
    .step-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* ==================================================== */
    /* 🌟 UI: Rating Scale 1-5 (ตามรูปภาพต้นฉบับ) 🌟 */
    /* ==================================================== */
    .rating-radio { position: relative; display: inline-block; cursor: pointer; }
    .rating-radio input { display: none; }
    .rating-box { width: 46px; height: 46px; display: flex; justify-content: center; align-items: center; border: 2px solid #e2e8f0; border-radius: 14px; font-weight: 800; font-size: 1.1rem; color: #94a3b8; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: white; }
    .rating-radio:hover .rating-box { border-color: #cbd5e1; }
    .rating-radio input:checked + .rating-box { background-color: #f57c00; border-color: #f57c00; color: white; transform: scale(1.05); box-shadow: 0 4px 12px rgba(245, 124, 0, 0.25); }

    /* ==================================================== */
    /* 🌟 UI: Custom Checkbox (Celebrate Effect) 🌟 */
    /* ==================================================== */
    .celebrate-wrapper { display: flex; align-items: center; cursor: pointer; position: relative; user-select: none; gap: 12px; padding: 0.5rem 0; }
    .celebrate-wrapper input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
    .celebrate-box { position: relative; height: 26px; width: 26px; border: 2px solid #cbd5e1; border-radius: 50%; transition: .3s; background: white; display: flex; justify-content: center; align-items: center; }
    .celebrate-wrapper:hover .celebrate-box { border-color: #f57c00; }
    .celebrate-wrapper input:checked ~ .celebrate-box { background-color: #f57c00; border-color: #f57c00; transform: scale(1.1); }
    .celebrate-box:after { content: ""; display: none; width: 6px; height: 12px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); margin-bottom: 2px; }
    .celebrate-wrapper input:checked ~ .celebrate-box:after { display: block; }
    .celebrate-text { font-weight: 500; color: #475569; transition: 0.2s; }
    .celebrate-wrapper input:checked ~ .celebrate-text { color: #f57c00; font-weight: 700; }
    
    /* The SVG Celebration */
    .celebrate-svg { position: absolute; left: -14px; top: -10px; width: 54px; height: 54px; transform-origin: center; animation: kfr-celebrate .4s forwards; display: none; stroke: #f57c00; pointer-events: none; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .celebrate-wrapper input:checked ~ .celebrate-svg { display: block; }
    @keyframes kfr-celebrate { 0% { transform: scale(0); } 50% { opacity: 1; } 100% { transform: scale(1.2); opacity: 0; display: none; } }

    /* ==================================================== */
    /* 🌟 UI: Custom Dropdown (ใส่ Icon ได้) 🌟 */
    /* ==================================================== */
    .custom-select-wrapper { position: relative; width: 100%; user-select: none; }
    .custom-select-trigger { background: #f8fafc; border: 2px solid #e2e8f0; padding: 0.875rem 1.25rem; border-radius: 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; font-weight: 500; color: #1e293b; }
    .custom-select-trigger:hover { border-color: #f57c00; }
    .custom-select-wrapper.open .custom-select-trigger { border-color: #f57c00; box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.1); background-color: #fff; }
    .custom-options { position: absolute; display: block; top: calc(100% + 8px); left: 0; right: 0; border: 2px solid #e2e8f0; border-radius: 1rem; background: #fff; transition: all 0.2s; opacity: 0; visibility: hidden; pointer-events: none; z-index: 50; max-height: 280px; overflow-y: auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .custom-select-wrapper.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; }
    .custom-option { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; border-bottom: 1px solid #f1f5f9; font-weight: 500; color: #475569; }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover, .custom-option.selected { background-color: #fff8f0; color: #f57c00; }

    /* Normal Radio for Event Date / Gender */
    .normal-radio { position: relative; display: flex; align-items: center; cursor: pointer; padding: 1.25rem; border: 2px solid #e2e8f0; border-radius: 1rem; background: #fff; transition: 0.2s; font-weight: 600;}
    .normal-radio input { position: absolute; opacity: 0; cursor: pointer; }
    .n-checkmark { height: 22px; width: 22px; border: 2px solid #cbd5e1; border-radius: 50%; margin-right: 12px; position: relative; transition: 0.2s; }
    .normal-radio input:checked ~ .n-checkmark { border-color: #f57c00; }
    .normal-radio input:checked ~ .n-checkmark:after { content: ""; position: absolute; top: 4px; left: 4px; width: 10px; height: 10px; border-radius: 50%; background: #f57c00; }
    .normal-radio.active-radio { border-color: #f57c00; background-color: #fff8f0; }

    /* School Dropdown Styling */
    #schoolDropdown { position: absolute; z-index: 50; width: 100%; background: #fff; border: 2px solid #e2e8f0; border-radius: 1rem; margin-top: 6px; max-height: 250px; overflow-y: auto; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    #schoolDropdown li { padding: 14px 18px; font-size: 0.95rem; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; transition: 0.2s;}
    #schoolDropdown li:hover { background-color: #fff8f0; color: #f57c00; }

    .loader-sm { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-dvh bg-gradient-to-br from-[#aedd50] via-[#8bc34a] to-[#689f38] p-4 md:p-8 flex flex-col items-center">

  <div id="loadingScreen" class="fixed inset-0 bg-[#f1f8e9] z-[100] flex flex-col items-center justify-center transition-opacity duration-500 p-6">
      <div class="main-container p-8 md:p-12 text-center max-w-sm w-full relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#8bc34a] to-[#aedd50]"></div>
          
          <div class="w-24 h-24 bg-[#f9fbe7] rounded-full flex items-center justify-center text-[#8bc34a] mx-auto mb-6 shadow-inner border border-[#e6ee9c]">
              <i class="fi fi-sr-document-signed text-5xl mt-2 animate-bounce"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-gray-800 mb-2">เตรียมความพร้อม</h2>
          <p class="text-sm text-gray-500 mb-8" id="loadingText">กำลังดึงฐานข้อมูลโรงเรียน...</p>

          <div class="w-full bg-gray-100 h-6 rounded-full overflow-hidden mb-2 p-1 shadow-inner relative border border-gray-200">
              <div id="loadingBar" class="h-full bg-gradient-to-r from-[#ff9800] to-[#f57c00] transition-all duration-300 ease-out rounded-full w-0 flex items-center justify-center">
                  <span id="loadPerc" class="absolute text-xs font-black text-white px-2 drop-shadow-md">0%</span>
              </div>
          </div>
      </div>
  </div>

  <div id="mainContent" class="w-full max-w-3xl relative z-10 opacity-0 hidden transition-opacity duration-700">
      <a href="index.html" class="mb-4 flex items-center gap-2 text-white/90 hover:text-white font-medium bg-black/20 px-5 py-2.5 rounded-full backdrop-blur-sm w-fit text-sm transition-colors cursor-pointer">
         <i class="fi fi-sr-arrow-small-left text-xl mt-1"></i> ย้อนกลับหน้าแรก
      </a>

      <div class="main-container w-full p-6 md:p-10 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-2 bg-[#f57c00]"></div>

          <div id="formStepper" class="mb-10 relative max-w-lg mx-auto mt-2">
              <div class="flex items-center justify-between relative z-10">
                  <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-gray-200 -z-10 rounded-full"></div>
                  <div class="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-[#8bc34a] transition-all duration-500 rounded-full" id="progressBar" style="width: 0%;"></div>
                  <div class="flex flex-col items-center gap-2"><div id="dot1" class="w-10 h-10 rounded-full bg-[#8bc34a] text-white flex items-center justify-center font-extrabold text-lg shadow-md">1</div></div>
                  <div class="flex flex-col items-center gap-2"><div id="dot2" class="w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-extrabold text-lg transition-colors">2</div></div>
                  <div class="flex flex-col items-center gap-2"><div id="dot3" class="w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-extrabold text-lg transition-colors">3</div></div>
              </div>
          </div>

          <form id="surveyForm" class="space-y-6">
              
              <div id="step1" class="step-section active space-y-6">
                  <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-4 border-b pb-4 border-gray-100">
                      <div class="w-12 h-12 bg-[#f1f8e9] rounded-xl flex items-center justify-center text-[#7cb342]"><i class="fi fi-sr-user mt-1"></i></div> ข้อมูลส่วนตัว
                  </h2>
                  <div>
                      <label class="block text-base font-bold mb-2 text-gray-700">วันที่เข้าร่วมกิจกรรม <span class="text-red-500">*</span></label>
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                          <label class="normal-radio"><input type="radio" name="eventDate" value="25 เมษายน 2569" onchange="updateRadioStyle(this, 'normal-radio')"><span class="n-checkmark"></span><span class="text-gray-700">25 เมษายน 2569 (วันที่ 1)</span></label>
                          <label class="normal-radio"><input type="radio" name="eventDate" value="26 เมษายน 2569" onchange="updateRadioStyle(this, 'normal-radio')"><span class="n-checkmark"></span><span class="text-gray-700">26 เมษายน 2569 (วันที่ 2)</span></label>
                      </div>
                  </div>
                  <div>
                      <label class="block text-base font-bold mb-2 text-gray-700">เบอร์โทรศัพท์ (ID คูปอง) <span class="text-red-500">*</span></label>
                      <div class="relative">
                          <i class="fi fi-sr-phone-call absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                          <input type="tel" id="phone" class="input-glass pl-14 font-extrabold text-xl tracking-widest text-gray-800" placeholder="08X-XXX-XXXX" maxlength="12" oninput="formatPhone(this)">
                      </div>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div>
                          <label class="block text-base font-bold mb-2 text-gray-700">ประเภทผู้เข้าร่วม <span class="text-red-500">*</span></label>
                          <select id="userType" class="input-glass" onchange="updateDynamicFields()">
                              <option value="">-- เลือกประเภท --</option>
                              <option value="นักเรียน">นักเรียน</option><option value="นักศึกษามหาวิทยาลัย">นักศึกษามหาวิทยาลัย</option>
                              <option value="ครู / อาจารย์">ครู / อาจารย์</option><option value="ผู้ปกครอง">ผู้ปกครอง</option><option value="ประชาชนทั่วไป">ประชาชนทั่วไป</option>
                          </select>
                      </div>
                      <div>
                          <label class="block text-base font-bold mb-2 text-gray-700">เพศ <span class="text-red-500">*</span></label>
                          <select id="gender" class="input-glass">
                              <option value="">-- เลือกเพศ --</option><option value="ชาย">ชาย</option><option value="หญิง">หญิง</option><option value="LGBTQ">LGBTQ+</option>
                          </select>
                      </div>
                      <div id="wrapAge">
                          <label class="block text-base font-bold mb-2 text-gray-700">ช่วงอายุ <span class="text-red-500">*</span></label>
                          <select id="age" class="input-glass">
                              <option value="">-- เลือกอายุ --</option><option value="ต่ำกว่า 15 ปี">ต่ำกว่า 15 ปี</option><option value="16 - 18 ปี">16 - 18 ปี</option><option value="18 - 23 ปี">18 - 23 ปี</option><option value="มากกว่า 23 ปี">มากกว่า 23 ปี</option>
                          </select>
                      </div>
                      <div id="wrapParentRelation" class="hidden col-span-1 md:col-span-2 bg-orange-50 p-4 rounded-xl border border-orange-100">
                          <label class="block text-sm font-bold mb-2 text-orange-700">ความเกี่ยวข้อง <span class="text-red-500">*</span></label>
                          <select id="parentRelation" class="input-glass border-orange-200">
                              <option value="">-- เลือกความเกี่ยวข้อง --</option><option value="พ่อ">พ่อ</option><option value="แม่">แม่</option><option value="ลุง">ลุง</option><option value="ป้า">ป้า</option><option value="น้า">น้า</option><option value="อา">อา</option><option value="ปู่">ปู่</option><option value="ย่า">ย่า</option><option value="ตา">ตา</option><option value="ยาย">ยาย</option>
                          </select>
                      </div>
                  </div>
                  <div class="flex justify-end pt-6 border-t mt-4"><button type="button" onclick="nextStep(1)" class="btn-orange px-10 py-3.5 font-extrabold text-lg flex items-center gap-2">ถัดไป <i class="fi fi-sr-arrow-right mt-1 text-sm"></i></button></div>
              </div>

              <div id="step2" class="step-section space-y-6">
                  <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-4 border-b pb-4 border-gray-100">
                      <div class="w-12 h-12 bg-[#fff3e0] rounded-xl flex items-center justify-center text-[#ff9800]"><i class="fi fi-sr-book-alt mt-1"></i></div> ข้อมูลการศึกษา
                  </h2>
                  <div>
                      <label class="block text-base font-bold mb-2 text-gray-700">ระดับการศึกษา <span class="text-red-500">*</span></label>
                      <select id="education" class="input-glass" onchange="checkOther(this, 'otherEducation')"><option value="">-- เลือกระดับการศึกษา --</option></select>
                      <input type="text" id="otherEducation" class="input-glass mt-3 hidden border-[#f57c00] bg-[#fff8f0]" placeholder="โปรดระบุระดับการศึกษา...">
                  </div>

                  <div id="schoolSection" class="hidden bg-gray-50 p-6 rounded-2xl border border-gray-200 space-y-5">
                      <div id="wrapSchoolSearch" class="hidden relative">
                          <label class="block text-sm font-bold mb-2 text-gray-800" id="schoolLabel">โรงเรียน <span class="text-red-500">*</span></label>
                          <input type="text" id="schoolInputSearch" class="input-glass border-orange-300 focus:border-orange-500" autocomplete="off" placeholder="พิมพ์ชื่อโรงเรียน (เช่น สตรีวิทยา...)" oninput="fastSearchSchool(this.value)">
                          <ul id="schoolDropdown"></ul>
                      </div>
                      <div id="wrapUni" class="hidden">
                          <label class="block text-sm font-bold mb-2 text-gray-800">มหาวิทยาลัย / สถาบันของท่าน <span class="text-red-500">*</span></label>
                          <input type="text" id="uniSchool" class="input-glass border-orange-300 focus:border-orange-500" placeholder="พิมพ์ชื่อสถาบัน...">
                      </div>
                      <div id="wrapProvince" class="hidden">
                          <label class="block text-sm font-bold mb-2 text-gray-800">จังหวัดที่ตั้งของสถาบัน <span class="text-red-500">*</span></label>
                          <select id="provinceSelect" class="input-glass border-orange-300 focus:border-orange-500"><option value="">-- เลือกจังหวัด --</option></select>
                      </div>
                  </div>
                  
                  <div class="flex justify-between pt-6 border-t mt-4">
                      <button type="button" onclick="prevStep(2)" class="px-6 py-2.5 text-gray-500 hover:text-[#f57c00] font-extrabold transition">ย้อนกลับ</button>
                      <button type="button" onclick="nextStep(2)" class="btn-orange px-10 py-3.5 font-extrabold text-lg flex items-center gap-2">ถัดไป <i class="fi fi-sr-arrow-right mt-1 text-sm"></i></button>
                  </div>
              </div>

              <div id="step3" class="step-section space-y-6">
                  <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-4 border-b pb-4 border-gray-100">
                      <div class="w-12 h-12 bg-[#ffebee] rounded-xl flex items-center justify-center text-[#e53935]"><i class="fi fi-sr-heart mt-1"></i></div> แบบสอบถาม
                  </h2>
                  
                  <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200 space-y-6">
                      <div>
                          <label class="block text-base font-bold mb-3 text-gray-700">รู้จักราชวิทยาลัยจุฬาภรณ์มาก่อนหรือไม่ <span class="text-red-500">*</span></label>
                          <div class="flex gap-4">
                              <label class="normal-radio w-full"><input type="radio" name="knowCRA" value="ใช่ รู้จัก" onchange="updateRadioStyle(this, 'normal-radio')"><span class="n-checkmark"></span><span class="text-gray-700">ใช่ รู้จัก</span></label>
                              <label class="normal-radio w-full"><input type="radio" name="knowCRA" value="ไม่รู้จัก" onchange="updateRadioStyle(this, 'normal-radio')"><span class="n-checkmark"></span><span class="text-gray-700">ไม่รู้จัก</span></label>
                          </div>
                      </div>
                      <hr class="border-gray-200">
                      <div>
                          <label class="block text-base font-bold mb-3 text-[#f57c00]">รู้จักจากช่องทางใด (ตอบได้มากกว่า 1) <span class="text-red-500">*</span></label>
                          <div id="channelGroup" class="grid grid-cols-1 gap-2 pl-1"></div>
                          <input type="text" id="otherChannel" class="input-glass mt-3 hidden border-[#f57c00] bg-[#fff8f0]" placeholder="โปรดระบุช่องทาง...">
                      </div>
                      <hr class="border-gray-200">
                      <div>
                          <label class="block text-base font-bold mb-3 text-[#f57c00]">สื่อที่ใช้ติดตามข่าวสาร (ตอบได้มากกว่า 1) <span class="text-red-500">*</span></label>
                          <div id="mediaGroup" class="grid grid-cols-1 md:grid-cols-2 gap-2 pl-1"></div>
                          <input type="text" id="otherMedia" class="input-glass mt-3 hidden border-[#f57c00] bg-[#fff8f0]" placeholder="โปรดระบุสื่อ...">
                      </div>
                  </div>

                  <div>
                      <label class="block text-base font-bold mb-2 text-gray-700">หลักสูตรที่สนใจ (Custom Dropdown)</label>
                      <div class="space-y-3 p-5 border border-gray-200 rounded-2xl bg-white" id="courseDropdownContainer">
                          <input type="hidden" id="interest1">
                          <input type="hidden" id="interest2">
                          <input type="hidden" id="interest3">
                      </div>
                  </div>

                  <div>
                      <label class="block text-base font-bold mb-2 text-gray-700">รอบ TCAS ที่สนใจ</label>
                      <select id="tcasRound" class="input-glass">
                          <option value="">-- เลือกรอบ --</option><option value="รอบ 1 Portfolio">รอบ 1 Portfolio</option><option value="รอบ 2 Quota">รอบ 2 Quota</option><option value="รอบ 3 Admission">รอบ 3 Admission</option><option value="รอบ 4 Direct Admission">รอบ 4 Direct Admission</option>
                      </select>
                  </div>
                  
                  <div class="p-6 border border-orange-200 bg-orange-50/50 rounded-2xl">

                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: action, data: data })
            });
            return await res.json();

            throw new Error('Network Error');

    }

                currentPerc += Math.random() * 5;
                if(currentPerc > 90) currentPerc = 90;
                updateLoadingUI(Math.floor(currentPerc));
            }
        }, 150);

        apiCall('getSchoolData').then(data => {
            clearInterval(loadingInterval);

                    loader.classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('h-0', 'overflow-hidden', 'opacity-0', 'hidden');

            var html = "";

                html += `<label class="celebrate-wrapper"><input type="checkbox" name="${name}" value="${arr[i]}"><div class="celebrate-box"></div>${svgCelebrate}<span class="celebrate-text">${arr[i]}</span></label>`;
            }
            html += `<label class="celebrate-wrapper"><input type="checkbox" onchange="checkOther(this, '${otherId}')"><div class="celebrate-box"></div>${svgCelebrate}<span class="celebrate-text">อื่นๆ</span></label>`;

        };

        document.getElementById('mediaGroup').innerHTML = buildCheck(medias, 'chkMedia', 'otherMedia');

    // 🌟 Custom Dropdown Engine (With Icons) 🌟
    function refreshCourseOptions() {
        var v1 = document.getElementById('interest1').value;
        var v2 = document.getElementById('interest2').value;
        var v3 = document.getElementById('interest3').value;
        var selectedArr = [v1, v2, v3].filter(v => v !== "");

        var wrappers = document.querySelectorAll('.custom-select-wrapper');
        wrappers.forEach(function(wrapper, index) {
            var currentSelectId = 'interest' + (index + 1);
            var currentVal = document.getElementById(currentSelectId).value;
            var opts = wrapper.querySelectorAll('.custom-option');

            opts.forEach(function(opt) {
                var val = opt.getAttribute('data-value');
                if (!val) return; 
                opt.style.display = (selectedArr.includes(val) && val !== currentVal) ? 'none' : 'flex'; 
            });
        });
    }

    function buildCustomCourseDropdown(selectId, placeholder) {
        var container = document.getElementById('courseDropdownContainer');
        var hiddenSelect = document.getElementById(selectId);
        var wrapper = document.createElement('div');
        wrapper.className = "custom-select-wrapper mb-3";
        var trigger = document.createElement('div');
        trigger.className = "custom-select-trigger";
        trigger.innerHTML = `<span class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400"><i class="fi fi-sr-apps mt-1 text-sm"></i></div> ${placeholder}</span><i class="fi fi-sr-angle-small-down text-gray-400"></i>`;
        
        var optionsList = document.createElement('div');
        optionsList.className = "custom-options";
        var defOpt = document.createElement('div');
        defOpt.className = "custom-option text-gray-400";
        defOpt.innerHTML = `<span>${placeholder}</span>`;
        defOpt.onclick = function(e) {
            e.stopPropagation();
            hiddenSelect.value = "";
            trigger.innerHTML = `<span class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400"><i class="fi fi-sr-apps mt-1 text-sm"></i></div> ${placeholder}</span><i class="fi fi-sr-angle-small-down text-gray-400"></i>`;
            wrapper.classList.remove('open');
            refreshCourseOptions();
        };
        optionsList.appendChild(defOpt);

        for (var i = 0; i < coursesMap.length; i++) {
            var c = coursesMap[i];
            var opt = document.createElement('div');
            opt.className = "custom-option";
            opt.innerHTML = `<div class="w-8 h-8 bg-orange-50 rounded-full flex items-center justify-center text-[#f57c00]"><i class="fi ${c.icon} mt-1 text-sm"></i></div> <span class="font-bold">${c.name}</span>`;
            opt.setAttribute('data-value', c.name);
            opt.onclick = function(e) {
                e.stopPropagation();
                hiddenSelect.value = this.getAttribute('data-value');
                trigger.innerHTML = this.innerHTML + '<i class="fi fi-sr-angle-small-down text-gray-400"></i>';
                wrapper.classList.remove('open');
                refreshCourseOptions(); 
            };
            optionsList.appendChild(opt);
        }

        trigger.onclick = function(e) {
            e.stopPropagation();
            document.querySelectorAll('.custom-select-wrapper').forEach(w => { if(w !== wrapper) w.classList.remove('open'); });
            wrapper.classList.toggle('open');
        };
        wrapper.appendChild(trigger);
        wrapper.appendChild(optionsList);
        container.insertBefore(wrapper, hiddenSelect);
    }
    
    document.addEventListener('click', () => document.querySelectorAll('.custom-select-wrapper').forEach(w => w.classList.remove('open')));

    function updateRadioStyle(el, cls) {
        document.querySelectorAll(`input[name="${el.name}"]`).forEach(r => r.parentElement.classList.remove('active-radio'));
        if(el.checked) el.parentElement.classList.add('active-radio');
    }

    function formatPhone(input) {
        var val = input.value.replace(/\D/g, '');
        if (val.length > 10) val = val.substring(0, 10);
        if (val.length > 6) input.value = val.substring(0, 3) + '-' + val.substring(3, 6) + '-' + val.substring(6);
        else if (val.length > 3) input.value = val.substring(0, 3) + '-' + val.substring(3);
        else input.value = val;
    }

    function checkOther(el, inputId) {
        var inp = document.getElementById(inputId);
        if ((el.value && el.value === "อื่นๆ") || el.checked) { inp.classList.remove('hidden'); inp.focus(); } 
        else { inp.classList.add('hidden'); inp.value = ""; }
    }

    function fastSearchSchool(val) {
        var box = document.getElementById('schoolDropdown');
        box.innerHTML = '';
        if (val.trim().length < 2) { box.style.display = 'none'; return; }

        var results = rawSchoolData.filter(r => r[0].toLowerCase().includes(val.toLowerCase())).slice(0, 15);
        if (results.length > 0) {
            results.forEach(r => {
                var li = document.createElement('li');
                li.innerHTML = '<span class="font-bold text-gray-800">' + r[0] + '</span> <span class="text-xs text-gray-400 ml-auto">จ.' + r[1] + '</span>';
                li.onclick = function() {
                    document.getElementById('schoolInputSearch').value = r[0];
                    document.getElementById('provinceSelect').value = r[1];
                    box.style.display = 'none';
                };
                box.appendChild(li);
            });
        } else {
            box.innerHTML = '<li class="text-gray-500 italic px-4 py-3">พิมพ์ชื่อโรงเรียนของท่านเองได้เลยครับ</li>';
        }
        box.style.display = 'block';
    }

    function toggleFollowPlatform() {
        var followRadio = document.querySelector('input[name="followPage"]:checked');
        var wrap = document.getElementById('wrapFollowPlatform');
        if (followRadio && followRadio.value === "ใช่ติดตาม") { wrap.classList.remove('hidden'); } 
        else { wrap.classList.add('hidden'); document.getElementById('followPlatform').value = ""; }
    }

    function nextStep(step) {
        if (step === 1) {
            if (!document.querySelector('input[name="eventDate"]:checked') || document.getElementById('phone').value.length !== 12 || !document.getElementById('userType').value || !document.getElementById('gender').value) {
                Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกข้อมูลให้ครบถ้วน'}); return;
            }
            if (document.getElementById('userType').value === 'ผู้ปกครอง' && !document.getElementById('parentRelation').value) {
                Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกความเกี่ยวข้อง'}); return;
            }
        } 
        else if (step === 2) {
            var edu = document.getElementById('education');
            if (!edu.value || (edu.value === 'อื่นๆ' && !document.getElementById('otherEducation').value)) { 
                Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาระบุระดับการศึกษา'}); return; 
            }
            var type = document.getElementById('userType').value;
            if (type === "นักเรียน" && (!document.getElementById('schoolInputSearch').value || !document.getElementById('provinceSelect').value)) return Swal.fire({icon: 'warning', text: 'ระบุโรงเรียนและจังหวัด'});
            if (type === "นักศึกษามหาวิทยาลัย" && (!document.getElementById('uniSchool').value || !document.getElementById('provinceSelect').value)) return Swal.fire({icon: 'warning', text: 'ระบุมหาวิทยาลัยและจังหวัด'});
            if (type === "ครู / อาจารย์" && !document.getElementById('schoolInputSearch').value) return Swal.fire({icon: 'warning', text: 'ระบุสถาบันที่สอน'});
        }

        document.getElementById('step'+step).classList.remove('active'); document.getElementById('step'+(step+1)).classList.add('active');
        document.getElementById('progressBar').style.width = step===1 ? '50%' : '100%';
        document.getElementById('dot'+(step+1)).className = "w-10 h-10 rounded-full bg-[#8bc34a] text-white flex items-center justify-center font-extrabold text-lg shadow-md transition-colors";
        window.scrollTo(0,0);
    }

    function prevStep(step) {
        document.getElementById('step'+step).classList.remove('active'); document.getElementById('step'+(step-1)).classList.add('active');
        document.getElementById('progressBar').style.width = step===2 ? '0%' : '50%';
        document.getElementById('dot'+step).className = "w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center font-extrabold text-lg transition-colors";
        window.scrollTo(0,0);
    }

    function goBackToHome() { window.top.location.href = "index.html"; }

    function submitData() {
        let reqRadios = ['knowCRA', 'followPage', 'desireScore', 'mediaSatisfactionScore', 'prSatisfactionScore', 'openHouseScore', 'satisfactionScore'];
        if(reqRadios.some(n => !document.querySelector(`input[name="${n}"]:checked`))) {
            return Swal.fire({icon:'warning', text:'กรุณาทำแบบสอบถามและให้คะแนน 1-5 ให้ครบทุกข้อ'});
        }

        if (document.querySelector('input[name="followPage"]:checked').value === "ใช่ติดตาม" && !document.getElementById('followPlatform').value) {
            return Swal.fire({icon:'warning', text:'กรุณาเลือกแพลตฟอร์มที่คุณติดตาม'});
        }

        if (!document.getElementById('suggestion').value.trim()) return Swal.fire({icon:'warning', text:'กรุณากรอกข้อเสนอแนะ'});

        let getCheck = (n, id) => Array.from(document.querySelectorAll(`input[name="${n}"]:checked`)).map(e=>e.value).concat(document.getElementById(id).value ? ["อื่นๆ: "+document.getElementById(id).value] : []).join(', ');
        var channelsStr = getCheck('chkChannel', 'otherChannel'), mediasStr = getCheck('chkMedia', 'otherMedia');
        if(!channelsStr || !mediasStr) return Swal.fire({icon:'warning', text:'กรุณาเลือกช่องทางและสื่ออย่างน้อย 1 ข้อ'});

        var type = document.getElementById('userType').value;
        var schoolData = (type === "นักศึกษามหาวิทยาลัย") ? document.getElementById('uniSchool').value : document.getElementById('schoolInputSearch').value;

        var payload = {
            eventDate: document.querySelector('input[name="eventDate"]:checked').value,
            phone: document.getElementById('phone').value,
            userType: type === 'ผู้ปกครอง' ? 'ผู้ปกครอง : ' + document.getElementById('parentRelation').value : type, 
            gender: document.getElementById('gender').value, 
            age: (type === 'ครู / อาจารย์' || type === 'ผู้ปกครอง') ? "มากกว่า 23 ปี" : document.getElementById('age').value,
            education: document.getElementById('education').value === "อื่นๆ" ? document.getElementById('otherEducation').value : document.getElementById('education').value,
            school: schoolData, 
            teachingSchool: (type === "ครู / อาจารย์") ? schoolData : "", 
            province: document.getElementById('provinceSelect').value,
            knowCRA: document.querySelector('input[name="knowCRA"]:checked').value, 
            channel: channelsStr, media: mediasStr,
            interest1: document.getElementById('interest1').value, 
            interest2: document.getElementById('interest2').value, 
            interest3: document.getElementById('interest3').value, 
            tcasRound: document.getElementById('tcasRound').value,
            desireScore: document.querySelector('input[name="desireScore"]:checked').value, 
            openHouseScore: document.querySelector('input[name="openHouseScore"]:checked').value, 
            satisfactionScore: document.querySelector('input[name="satisfactionScore"]:checked').value, 
            suggestion: document.getElementById('suggestion').value,
            followPage: document.querySelector('input[name="followPage"]:checked').value,
            followPlatform: document.getElementById('followPlatform').value || "-",
            prSatisfactionScore: document.querySelector('input[name="prSatisfactionScore"]:checked').value,
            mediaSatisfactionScore: document.querySelector('input[name="mediaSatisfactionScore"]:checked').value
        };

        Object.keys(payload).forEach(k => payload[k] = payload[k] || "-");

        var btn = document.getElementById('btnSubmit'); var originTxt = btn.innerHTML;
        btn.innerHTML = '<span class="loader-sm mr-2"></span> กำลังบันทึก...'; btn.disabled = true;

        apiCall('submitSurvey', payload).then(res => {
            btn.innerHTML = originTxt; btn.disabled = false;
            if (res.status === 'success') {
                document.getElementById('surveyForm').classList.add('hidden'); document.getElementById('formStepper').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
                document.getElementById('displayUserId').innerText = res.couponData.id;
                document.getElementById('displayQrCode').src = 'https://quickchart.io/qr?text=' + encodeURIComponent(res.couponData.id) + '&size=300';
                window.scrollTo(0,0);
            } else Swal.fire({icon: 'error', title: 'ไม่สำเร็จ', text: res.message});
        }).catch(() => { 
            btn.innerHTML = originTxt; btn.disabled = false; Swal.fire({icon: 'error', text: 'เชื่อมต่อเซิร์ฟเวอร์ขัดข้อง'}); 
        });
    }
  </script>
</body>
